<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>崇左 6日亲子自驾游</title>
<style>
:root {
  --green-dark: #1b4332;
  --green-primary: #2d6a4f;
  --green-mid: #40916c;
  --green-light: #52b788;
  --green-bg: #f0fdf4;
  --rock-gray: #8d99ae;
  --white: #f8f9fa;
  --accent-red: #d62828;
  --text-dark: #1b4332;
  --text-body: #2d3436;
  --text-muted: #8d99ae;
  --border: #e0e7e3;
  --card-bg: #ffffff;
  --shadow-sm: 0 1px 3px rgba(27,67,50,0.06);
  --shadow: 0 4px 12px rgba(27,67,50,0.08);
  --shadow-lg: 0 8px 24px rgba(27,67,50,0.12);
  --radius: 16px;
  --radius-sm: 10px;
  --xhs-red: #ff2442;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--green-bg);color:var(--text-body);line-height:1.6;-webkit-font-smoothing:antialiased}
.bento{max-width:1080px;margin:0 auto;padding:16px;display:grid;gap:16px;grid-template-columns:1fr}

/* === HERO === */
.hero-card{background:linear-gradient(135deg,#2d6a4f 0%,#40916c 50%,#52b788 100%);border-radius:var(--radius);padding:40px 32px 48px;color:#fff;position:relative;overflow:hidden;box-shadow:var(--shadow-lg)}
.hero-card .karst-bg{position:absolute;bottom:0;left:0;width:100%;pointer-events:none}
.hero-title{font-size:32px;font-weight:800;letter-spacing:1px;margin-bottom:12px;position:relative;z-index:1}
.hero-meta{display:flex;flex-wrap:wrap;gap:12px 24px;font-size:14px;opacity:0.92;margin-bottom:20px;position:relative;z-index:1}
.hero-meta-item{display:inline-flex;align-items:center;gap:6px}
.hero-meta-item .icon-wrap{display:inline-flex;width:18px;height:18px;flex-shrink:0}
.hero-meta-item .icon-wrap svg{width:100%;height:100%}
.hero-weather-box{background:rgba(255,255,255,0.15);backdrop-filter:blur(10px);border-radius:var(--radius-sm);padding:14px 18px;font-size:13px;line-height:1.6;position:relative;z-index:1;display:flex;flex-wrap:wrap;gap:6px 24px}
.hero-weather-box span{display:inline-flex;align-items:center;gap:6px}
.hero-route{margin-top:16px;position:relative;z-index:1;background:rgba(255,255,255,0.12);border-radius:var(--radius-sm);padding:12px 18px;font-size:13px;letter-spacing:0.5px;line-height:1.7}
.hero-route-label{font-weight:600;margin-right:8px}

/* === WEATHER STRIP === */
.weather-strip{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
.weather-day{background:var(--card-bg);border-radius:var(--radius-sm);padding:14px 8px;text-align:center;box-shadow:var(--shadow-sm);border:1px solid var(--border);transition:transform 0.2s,box-shadow 0.2s}
.weather-day:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.wd-label{font-size:12px;color:var(--text-muted);margin-bottom:2px}
.wd-weekday{font-size:14px;font-weight:700;color:var(--text-dark)}
.wd-icon{margin:8px auto;display:flex;justify-content:center;align-items:center;width:36px;height:36px}
.wd-icon svg{width:100%;height:100%}
.wd-temp{font-size:13px;color:var(--text-body)}
.wd-temp strong{color:var(--accent-red);font-weight:700}
.wd-theme{font-size:11px;color:var(--text-muted);margin-top:4px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* === SECTION HEADERS === */
.section-header{font-size:22px;font-weight:800;color:var(--green-dark);padding:24px 0 12px;display:flex;align-items:center;gap:10px}
.section-header::before{content:'';display:block;width:4px;height:24px;background:linear-gradient(180deg,var(--green-primary),var(--green-light));border-radius:2px}

/* === DAILY ITINERARY ACCORDION === */
.day-accordion{display:flex;flex-direction:column;gap:0}
.day-header{background:var(--card-bg);border:1px solid var(--border);padding:16px 20px;cursor:pointer;user-select:none;display:flex;align-items:center;gap:14px;transition:background 0.2s,box-shadow 0.2s;border-radius:var(--radius-sm);margin-bottom:2px}
.day-header:hover{background:var(--green-bg)}
.day-header.active{background:linear-gradient(135deg,var(--green-primary),var(--green-mid));color:#fff;box-shadow:var(--shadow);border-color:transparent}
.day-header.active .dh-date,.day-header.active .dh-theme,.day-header.active .dh-weather{color:#fff}
.day-header.active .dh-chevron svg{color:#fff}
.dh-num{font-size:20px;font-weight:800;flex-shrink:0;width:32px;text-align:center}
.dh-content{flex:1;min-width:0}
.dh-date{font-size:12px;color:var(--text-muted)}
.dh-theme{font-size:15px;font-weight:600;color:var(--text-dark)}
.dh-weather{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--text-muted);margin-top:2px}
.dh-weather .dh-weather-icon{display:inline-flex;width:16px;height:16px}
.dh-weather .dh-weather-icon svg{width:100%;height:100%}
.dh-chevron{flex-shrink:0;width:20px;height:20px;transition:transform 0.3s;display:flex;align-items:center;justify-content:center}
.dh-chevron svg{width:20px;height:20px;color:var(--text-muted)}
.day-header.active .dh-chevron{transform:rotate(180deg)}
.day-panel{max-height:0;overflow:hidden;transition:max-height 0.4s ease}
.day-panel-inner{padding:12px 0 4px}
.road-connector{border-left:3px dashed var(--green-light);margin-left:24px;height:24px}

/* === ACTIVITY ITEMS === */
.activity-item{display:flex;gap:12px;padding:10px 16px;background:var(--card-bg);border-radius:var(--radius-sm);border:1px solid var(--border);margin-bottom:8px;transition:box-shadow 0.2s}
.activity-item:hover{box-shadow:var(--shadow-sm)}
.activity-item.is-meal{border-left:3px solid #f59e0b}
.ai-time{flex:0 0 52px;font-size:14px;font-weight:700;color:var(--green-primary);font-variant-numeric:tabular-nums;padding-top:2px}
.ai-body{flex:1;min-width:0}
.ai-top-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.ai-name{font-size:14px;font-weight:600;color:var(--text-dark)}
.ai-name a{color:var(--green-primary);text-decoration:none;border-bottom:1px dashed var(--green-light);transition:color 0.2s}
.ai-name a:hover{color:var(--accent-red);border-bottom-color:var(--accent-red)}
.ai-tag{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--green-bg);color:var(--green-primary);white-space:nowrap;border:1px solid var(--border)}
.ai-tag.meal-tag{background:#fffbeb;color:#b45309;border-color:#fde68a}
.ai-details{display:flex;flex-wrap:wrap;gap:4px 14px;font-size:12px;color:var(--text-muted);margin-bottom:4px}
.ai-details span{display:inline-flex;align-items:center;gap:3px}
.ai-note{font-size:13px;color:var(--text-body);line-height:1.6;background:var(--green-bg);padding:8px 12px;border-radius:8px;margin-top:6px}
.ai-meal-info{padding:4px 0}
.ai-meal-name{font-size:14px;font-weight:500;color:var(--text-dark);margin-bottom:4px}
.ai-meal-name a{color:var(--green-primary);text-decoration:none;border-bottom:1px dashed var(--green-light)}
.ai-meal-name a:hover{color:var(--accent-red)}
.ai-meal-meta{font-size:12px;color:var(--text-muted);display:flex;flex-wrap:wrap;gap:4px 12px}
.ai-meal-rec{font-size:13px;color:#b45309;margin-top:4px;font-weight:500}
.ai-refs{margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);display:flex;flex-wrap:wrap;gap:6px}
.ai-ref-tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--xhs-red);text-decoration:none;padding:3px 8px;border-radius:12px;background:#fff0f3;border:1px solid #fecdd3;transition:background 0.2s}
.ai-ref-tag:hover{background:#fecdd3}
.ai-ref-dot{width:6px;height:6px;border-radius:50%;background:var(--xhs-red);flex-shrink:0}

/* === HOTELS === */
.hotels-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.hotel-card{background:var(--card-bg);border-radius:var(--radius);padding:20px;border:1px solid var(--border);box-shadow:var(--shadow-sm);transition:transform 0.2s,box-shadow 0.2s;display:flex;flex-direction:column;gap:10px}
.hotel-card:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
.hc-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.hc-name{font-size:15px;font-weight:700;color:var(--text-dark)}
.hc-rating{display:inline-flex;align-items:center;gap:3px;font-size:12px;color:#f59e0b;font-weight:600}
.hc-area{font-size:12px;color:var(--text-muted)}
.hc-tags{display:flex;flex-wrap:wrap;gap:4px}
.hc-tag{font-size:11px;padding:3px 8px;border-radius:10px;background:var(--green-bg);color:var(--green-primary);border:1px solid var(--border)}
.hc-bottom{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-top:auto}
.hc-price{font-size:16px;font-weight:700;color:var(--accent-red)}
.hc-nights{font-size:12px;color:var(--text-muted)}
.hc-link{font-size:12px;padding:5px 14px;border-radius:14px;background:var(--green-primary);color:#fff;text-decoration:none;transition:background 0.2s;white-space:nowrap}
.hc-link:hover{background:var(--green-dark)}

/* === BUDGET === */
.budget-card{background:var(--card-bg);border-radius:var(--radius);padding:24px;border:1px solid var(--border);box-shadow:var(--shadow-sm)}
.budget-top{display:flex;align-items:center;gap:32px;flex-wrap:wrap;margin-bottom:20px}
.donut-container{flex:0 0 160px;position:relative}
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.donut-center-total{font-size:16px;font-weight:800;color:var(--text-dark)}
.donut-center-label{font-size:11px;color:var(--text-muted)}
.budget-legend{flex:1;min-width:180px;display:flex;flex-direction:column;gap:6px}
.bl-item{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text-body);cursor:pointer;padding:4px 0;transition:opacity 0.2s}
.bl-item:hover{opacity:0.7}
.bl-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.bl-amount{margin-left:auto;font-weight:700;color:var(--text-dark)}
.bl-pct{font-size:11px;color:var(--text-muted);margin-left:4px}
.budget-total-bar{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;background:linear-gradient(135deg,var(--green-primary),var(--green-mid));color:#fff;border-radius:var(--radius-sm);font-size:14px;font-weight:700;cursor:pointer;transition:box-shadow 0.2s;margin-bottom:12px}
.budget-total-bar:hover{box-shadow:var(--shadow)}
.budget-detail{max-height:0;overflow:hidden;transition:max-height 0.4s ease}
.budget-detail.expanded{max-height:1200px}
.budget-table{width:100%;border-collapse:collapse;font-size:13px}
.budget-table th{text-align:left;padding:10px 14px;background:var(--green-bg);color:var(--green-primary);font-weight:700}
.budget-table td{padding:7px 14px;border-bottom:1px solid var(--border)}
.budget-table td:last-child{text-align:right;font-weight:500}
.budget-table .subtotal-row td{font-weight:700;background:var(--green-bg);color:var(--green-primary)}
.budget-note{font-size:12px;color:var(--text-muted);margin-top:12px;line-height:1.6;padding:10px 14px;background:var(--green-bg);border-radius:8px}

/* === TIPS === */
.tips-list{display:flex;flex-direction:column;gap:6px}
.tip-item{background:var(--card-bg);border-radius:var(--radius-sm);border:1px solid var(--border);overflow:hidden}
.tip-header{padding:12px 16px;cursor:pointer;user-select:none;display:flex;align-items:center;justify-content:space-between;gap:12px;font-size:14px;font-weight:600;color:var(--text-dark);transition:background 0.2s}
.tip-header:hover{background:var(--green-bg)}
.tip-chevron{flex-shrink:0;width:16px;height:16px;transition:transform 0.3s;display:flex;align-items:center;justify-content:center}
.tip-chevron svg{width:16px;height:16px;color:var(--text-muted)}
.tip-item.open .tip-chevron{transform:rotate(180deg)}
.tip-body{max-height:0;overflow:hidden;transition:max-height 0.3s ease;padding:0 16px;font-size:13px;color:var(--text-body);line-height:1.7}
.tip-item.open .tip-body{max-height:400px;padding:0 16px 14px}

/* === REFERENCES === */
.refs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.ref-card{border:2px solid var(--xhs-red);border-radius:var(--radius-sm);padding:14px;background:var(--card-bg);transition:transform 0.2s,box-shadow 0.2s;cursor:pointer}
.ref-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.ref-card a{text-decoration:none;color:var(--text-dark);font-size:13px;font-weight:500;display:block;line-height:1.5}
.ref-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:8px;background:var(--xhs-red);color:#fff;margin-bottom:8px;font-weight:600}

/* === FOOTER === */
.page-footer{text-align:center;padding:20px 0 32px;font-size:12px;color:var(--text-muted)}

/* === RESPONSIVE === */
@media(max-width:768px){
  .bento{padding:10px}
  .hero-card{padding:28px 20px 40px}
  .hero-title{font-size:24px}
  .weather-strip{grid-template-columns:repeat(3,1fr)}
  .hotels-grid{grid-template-columns:1fr}
  .budget-top{flex-direction:column;align-items:center}
  .donut-container{flex:none}
  .refs-grid{grid-template-columns:1fr}
}
@media(max-width:480px){
  .hero-title{font-size:20px}
  .hero-card{padding:20px 16px 36px}
  .weather-strip{grid-template-columns:repeat(2,1fr)}
  .day-header{padding:12px 14px;gap:10px}
  .dh-num{font-size:16px;width:26px}
  .activity-item{padding:8px 12px}
  .ai-time{flex:0 0 44px;font-size:13px}
  .budget-card{padding:16px}
}

/* === PRINT === */
@media print{
  body{background:#fff}
  .hero-card{background:#2d6a4f!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .day-panel{max-height:none!important;overflow:visible!important}
  .day-header.active .dh-chevron,.tip-chevron{display:none}
  .tip-item .tip-body{max-height:none!important;overflow:visible!important;padding:0 16px 14px!important}
  .budget-detail{max-height:none!important;overflow:visible!important}
  .hotel-card:hover,.ref-card:hover,.weather-day:hover{transform:none;box-shadow:none}
}
</style>
</head>

  html+=metaItem('M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z','\u00a5'+b.total+' (\u4eba\u5747\u00a5'+b.perPerson+')');
  html+='</div>';
  html+='<div class="hero-weather-box">';
  html+='<span><span style="display:inline-flex;width:18px;height:18px">'+getWeatherSVG('partlyCloudy')+'</span> '+esc(w.summary)+'</span>';
  html+='<span><span style="display:inline-flex;width:18px;height:18px">'+svgIcon('M20.38 3.46L16 2 12 5.5 8 2 3.62 3.46 4.53 8.24A10 10 0 002 16.5a10 10 0 0020 0 10 10 0 00-2.53-8.26L20.38 3.46z','#fff')+'</span> '+esc(w.clothing)+'</span>';
  html+='</div>';
  html+='<div class="hero-route">';
  html+='<span class="hero-route-label">\u73af\u7ebf\u8def\u7ebf</span>';
  html+='\u5357\u5b81 \u2192 \u5d07\u5de6 \u2192 \u4f0f\u90a3 \u2192 \u660e\u4ed5 \u2192 \u6253\u5c6f/\u5cd2\u90a3 \u2192 \u5fb7\u5929 \u2192 \u901a\u7075 \u2192 \u5d07\u5de6 \u2192 \u5357\u5b81';
  html+='</div>';
  html+='</div>';
  return html;
}

function metaItem(pathD,text){
  var html='<span class="hero-meta-item">';
  html+='<span class="icon-wrap">'+svgIcon(pathD,'#fff')+'</span>';
  html+=esc(text);
  html+='</span>';
  return html;
}

/* ===== RENDER: WEATHER STRIP ===== */
function renderWeatherStrip(){
  var html='<div class="weather-strip">';
  for(var i=0;i<tripData.days.length;i++){
    var d=tripData.days[i];
    html+='<div class="weather-day">';
    html+='<div class="wd-label">Day'+(i+1)+' '+esc(d.date)+'</div>';
    html+='<div class="wd-weekday">'+esc(d.weekday)+'</div>';
    html+='<div class="wd-icon">'+getWeatherSVG(d.weather.icon)+'</div>';
    html+='<div class="wd-temp"><strong>'+d.weather.high+'\u00b0</strong> / '+d.weather.low+'\u00b0</div>';
    var shortTheme=d.theme.length>8?d.theme.substring(0,8)+'...':d.theme;
    html+='<div class="wd-theme" title="'+esc(d.theme)+'">'+esc(shortTheme)+'</div>';
    html+='</div>';
  }
  html+='</div>';
  return html;
}

/* ===== RENDER: DAILY ITINERARY ===== */
function renderItinerary(){
  var html='<div class="section-header" id="itinerary">\u6BCF\u65E5\u884C\u7A0B</div>';
  html+='<div class="day-accordion" role="tablist">';
  for(var i=0;i<tripData.days.length;i++){
    var d=tripData.days[i];
    html+='<div class="day-header" role="tab" aria-expanded="false" aria-controls="day-'+i+'" tabindex="0" onclick="toggleDay('+i+')" onkeydown="handleDayKey(event,'+i+')">';
    html+='<span class="dh-num">D'+(i+1)+'</span>';
    html+='<div class="dh-content">';
    html+='<div class="dh-date">'+esc(d.date)+' '+esc(d.weekday)+'</div>';
    html+='<div class="dh-theme">'+esc(d.theme)+'</div>';
    html+='<div class="dh-weather"><span class="dh-weather-icon">'+getWeatherSVG(d.weather.icon)+'</span> '+d.weather.high+'/'+d.weather.low+'\u00b0C</div>';
    html+='</div>';
    html+='<span class="dh-chevron">'+chevronSVG()+'</span>';
    html+='</div>';
    html+='<div class="day-panel" id="day-'+i+'" role="tabpanel" style="max-height:0px">';
    html+='<div class="day-panel-inner">';
    html+=renderDayActivities(d.activities);
    html+='</div></div>';
    if(i<tripData.days.length-1){
      html+='<div class="road-connector" aria-hidden="true"></div>';
    }
  }
  html+='</div>';
  return html;
}

function renderDayActivities(activities){
  var html='';
  for(var i=0;i<activities.length;i++){
    html+=renderActivityItem(activities[i]);
  }
  return html;
}

function renderActivityItem(act){
  var isMeal=!!act.meal;
  var html='<div class="activity-item'+(isMeal?' is-meal':'')+'">';
  html+='<div class="ai-time">'+esc(act.time)+'</div>';
  html+='<div class="ai-body">';
  html+='<div class="ai-top-row">';
  html+='<span class="ai-name">';
  if(!isMeal && act.link){
    html+='<a href="'+esc(act.link)+'" target="_blank" rel="noopener">'+esc(act.name)+'</a>';
  } else {
    html+=esc(act.name);
  }
  html+='</span>';
  if(isMeal){
    var cuisineTag=act.meal.cuisine||'';
    if(cuisineTag) html+='<span class="ai-tag meal-tag">'+esc(cuisineTag)+'</span>';
  } else {
    var transport=act.transport||'';
    if(transport && transport!=='-') html+='<span class="ai-tag">'+esc(transport)+'</span>';
  }
  html+='</div>';

  if(isMeal){
    html+=renderMealInfo(act.meal);
  } else {
    if(act.duration || act.cost>0){
      html+='<div class="ai-details">';
      if(act.duration) html+='<span>'+esc(act.duration)+'</span>';
      if(act.cost>0) html+='<span>\u00a5'+act.cost+'/\u4eba</span>';
      html+='</div>';
    }
    if(act.note){
      html+='<div class="ai-note">'+esc(act.note)+'</div>';
    }
    if(act.refs && act.refs.length>0){
      html+=renderActRefs(act.refs);
    }
  }
  html+='</div></div>';
  return html;
}

function renderMealInfo(meal){
  var html='<div class="ai-meal-info">';
  html+='<div class="ai-meal-name">';
  if(meal.link){
    html+='<a href="'+esc(meal.link)+'" target="_blank" rel="noopener">'+esc(meal.name)+'</a>';
  } else {
    html+=esc(meal.name);
  }
  html+='</div>';
  html+='<div class="ai-meal-meta">';
  if(meal.perPerson>0) html+='<span>\u00a5'+meal.perPerson+'/\u4eba</span>';
  if(meal.location) html+='<span>'+esc(meal.location)+'</span>';
  html+='</div>';
  if(meal.recommended){
    html+='<div class="ai-meal-rec">'+esc(meal.recommended)+'</div>';
  }
  html+='</div>';
  return html;
}

function renderActRefs(refs){
  var html='<div class="ai-refs">';
  for(var i=0;i<refs.length;i++){
    html+='<a href="'+esc(refs[i].url)+'" target="_blank" rel="noopener" class="ai-ref-tag">';
    html+='<span class="ai-ref-dot"></span>'+esc(refs[i].title);
    html+='</a>';
  }
  html+='</div>';
  return html;
}

/* ===== RENDER: HOTELS ===== */
function renderHotels(){
  var html='<div class="section-header" id="hotels">\u4F4F\u5BBF\u63A8\u8350</div>';
  html+='<div class="hotels-grid">';
  for(var i=0;i<tripData.hotels.length;i++){
    var h=tripData.hotels[i];
    html+='<div class="hotel-card">';
    html+='<div class="hc-top">';
    html+='<span class="hc-name">'+esc(h.name)+'</span>';
    html+='<span class="hc-rating">'+starsSVG(h.rating)+' '+esc(h.rating)+'</span>';
    html+='</div>';
    html+='<div class="hc-area">'+esc(h.area)+'</div>';
    html+='<div class="hc-tags">';
    var tags=(h.highlights||'').split('\u00b7');
    for(var j=0;j<tags.length;j++){
      if(tags[j].trim()) html+='<span class="hc-tag">'+esc(tags[j].trim())+'</span>';
    }
    html+='</div>';
    html+='<div class="hc-bottom">';
    html+='<span class="hc-price">'+(h.priceTag==='~'?'~':'')+'\u00a5'+h.pricePerNight+'/\u665a</span>';
    html+='<span class="hc-nights">'+esc(h.nights)+'</span>';
    if(h.link) html+='<a href="'+esc(h.link)+'" target="_blank" rel="noopener" class="hc-link">\u67E5\u770B\u5730\u56FE</a>';
    html+='</div>';
    html+='</div>';
  }
  html+='</div>';
  return html;
}

/* ===== RENDER: BUDGET ===== */
function renderBudget(){
  var b=tripData.budget;
  var cats=[
    {name:'\u4EA4\u901A',data:b.transport,color:'#2d6a4f'},
    {name:'\u4F4F\u5BBF',data:b.accommodation,color:'#d62828'},
    {name:'\u9910\u996E',data:b.food,color:'#f59e0b'},
    {name:'\u95E8\u7968',data:b.tickets,color:'#52b788'},
    {name:'\u5176\u4ED6',data:b.other,color:'#8d99ae'}
  ];
  var total=b.total;
  var circumference=2*Math.PI*60;

  var html='<div class="section-header" id="budget">\u9884\u7B97\u660E\u7EC6</div>';
  html+='<div class="budget-card">';
  html+='<div class="budget-top">';

  /* SVG Donut */
  html+='<div class="donut-container">';
  html+='<svg width="160" height="160" viewBox="0 0 160 160">';
  var offset=0;
  for(var i=0;i<cats.length;i++){
    var pct=cats[i].data.subtotal/total;
    var dashLen=pct*circumference;
    var dashGap=circumference-dashLen;
    var rotation=-90+(offset/circumference)*360;
    html+='<circle cx="80" cy="80" r="60" fill="none" stroke="'+cats[i].color+'" stroke-width="20"';
    html+=' stroke-dasharray="'+dashLen.toFixed(2)+' '+dashGap.toFixed(2)+'"';
    html+=' transform="rotate('+rotation.toFixed(2)+' 80 80)"';
    html+=' style="transition:stroke-dasharray 0.5s"/>';
    offset+=dashLen;
  }
  html+='</svg>';
  html+='<div class="donut-center">';
  html+='<div class="donut-center-total">\u00a5'+total+'</div>';
  html+='<div class="donut-center-label">\u603B\u9884\u7B97</div>';
  html+='</div></div>';

  /* Legend */
  html+='<div class="budget-legend">';
  for(var i=0;i<cats.length;i++){
    var pct=((cats[i].data.subtotal/total)*100).toFixed(0);
    html+='<div class="bl-item">';
    html+='<span class="bl-dot" style="background:'+cats[i].color+'"></span>';
    html+='<span>'+cats[i].name+'</span>';
    html+='<span class="bl-pct">'+pct+'%</span>';
    html+='<span class="bl-amount">\u00a5'+cats[i].data.subtotal+'</span>';
    html+='</div>';
  }
  html+='</div></div>';

  /* Total bar */
  html+='<div class="budget-total-bar" onclick="toggleBudgetDetail()" role="button" tabindex="0" aria-expanded="false" aria-controls="budgetDetail">';
  html+='<span>\u603B\u8BA1 \u00a5'+total+' \u00b7 \u4EBA\u5747 \u00a5'+b.perPerson+'</span>';
  html+='<span style="font-size:12px;opacity:0.8">\u70B9\u51FB\u5C55\u5F00\u660E\u7EC6</span>';
  html+='</div>';

  /* Detail table */
  html+='<div class="budget-detail" id="budgetDetail">';
  html+='<table class="budget-table"><thead><tr><th>\u9879\u76EE</th><th>\u91D1\u989D</th></tr></thead><tbody>';
  for(var i=0;i<cats.length;i++){
    var items=cats[i].data.items;
    for(var j=0;j<items.length;j++){
      html+='<tr><td>'+esc(items[j].name)+'</td><td>\u00a5'+items[j].cost+'</td></tr>';
    }
    html+='<tr class="subtotal-row"><td>'+cats[i].name+'\u5C0F\u8BA1</td><td>\u00a5'+cats[i].data.subtotal+'</td></tr>';
  }
  html+='</tbody></table>';
  html+='</div>';

  /* Budget note */
  html+='<div class="budget-note">'+esc(b.note)+'</div>';
  html+='</div>';
  return html;
}

/* ===== RENDER: TIPS ===== */
function renderTips(){
  var html='<div class="section-header" id="tips">\u5B9E\u7528\u8D34\u58EB</div>';
  html+='<div class="tips-list">';
  for(var i=0;i<tripData.tips.length;i++){
    var tip=tripData.tips[i];
    var titleMatch=tip.match(/\u3010(.+?)\u3011/);
    var title=titleMatch?titleMatch[1]:'\u8D34\u58EB'+(i+1);
    var body=titleMatch?tip.replace(/\u3010.+?\u3011/,'').trim():tip;
    html+='<div class="tip-item">';
    html+='<div class="tip-header" role="button" tabindex="0" aria-expanded="false" onclick="toggleTip(this)" onkeydown="handleTipKey(event,this)">';
    html+='<span>'+esc(title)+'</span>';
    html+='<span class="tip-chevron">'+chevronSVG()+'</span>';
    html+='</div>';
    html+='<div class="tip-body">'+esc(body)+'</div>';
    html+='</div>';
  }
  html+='</div>';
  return html;
}

/* ===== RENDER: REFERENCES ===== */
function renderReferences(){
  if(!tripData.references||tripData.references.length===0)return '';
  var html='<div class="section-header" id="refs">\u53C2\u8003\u653B\u7565</div>';
  html+='<div class="refs-grid">';
  for(var i=0;i<tripData.references.length;i++){
    var r=tripData.references[i];
    html+='<div class="ref-card">';
    html+='<span class="ref-badge">\u5C0F\u7EA2\u4E66</span>';
    html+='<a href="'+esc(r.url)+'" target="_blank" rel="noopener">'+esc(r.title)+'</a>';
    html+='</div>';
  }
  html+='</div>';
  return html;
}

/* ===== RENDER: FOOTER ===== */
function renderFooter(){
  return '<div class="page-footer">\u751F\u6210\u65E5\u671F: '+esc(tripData.generationDate)+' \u00b7 \u673A\u7968\u548C\u9152\u5E97\u4E3A\u52A8\u6001\u5B9A\u4EF7\uFF0C\u51FA\u884C\u524D\u8BF7\u786E\u8BA4\u5B9E\u9645\u4EF7\u683C</div>';
}

/* ===== EVENT HANDLERS ===== */
function toggleDay(index){
  var panel=document.getElementById('day-'+index);
  var header=panel.previousElementSibling;
  while(header && !header.classList.contains('day-header')){
    header=header.previousElementSibling;
  }
  var isOpen=panel.style.maxHeight && panel.style.maxHeight!=='0px';
  var allPanels=document.querySelectorAll('.day-panel');
  for(var i=0;i<allPanels.length;i++){
    allPanels[i].style.maxHeight='0px';
  }
  var allHeaders=document.querySelectorAll('.day-header');
  for(var i=0;i<allHeaders.length;i++){
    allHeaders[i].classList.remove('active');
    allHeaders[i].setAttribute('aria-expanded','false');
  }
  if(!isOpen){
    panel.style.maxHeight=panel.scrollHeight+'px';
    header.classList.add('active');
    header.setAttribute('aria-expanded','true');
  }
}

function handleDayKey(e,index){
  if(e.key==='Enter'||e.key===' '){
    e.preventDefault();
    toggleDay(index);
  }
}

function toggleTip(el){
  var card=el.parentElement;
  var isOpen=card.classList.contains('open');
  card.classList.toggle('open');
  el.setAttribute('aria-expanded',isOpen?'false':'true');
}

function handleTipKey(e,el){
  if(e.key==='Enter'||e.key===' '){
    e.preventDefault();
    toggleTip(el);
  }
}

function toggleBudgetDetail(){
  var detail=document.getElementById('budgetDetail');
  var bar=detail.previousElementSibling;
  var isOpen=detail.classList.contains('expanded');
  detail.classList.toggle('expanded');
  bar.setAttribute('aria-expanded',isOpen?'false':'true');
}

/* ===== INIT ===== */
function init(){
  var html=renderHero();
  html+=renderWeatherStrip();
  html+=renderItinerary();
  html+=renderHotels();
  html+=renderBudget();
  html+=renderTips();
  html+=renderReferences();
  html+=renderFooter();
  document.getElementById('app').innerHTML=html;
  /* Auto-open Day 1 */
  toggleDay(0);
}

init();
</script>
