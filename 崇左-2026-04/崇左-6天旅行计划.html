<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>崇左 6日亲子游 | 2026.04.02-07</title>
<style>
:root{
  --c-forest:#1a4d3a;--c-emerald:#2d7a5e;--c-jade:#4a9e7a;
  --c-gold:#c8956d;--c-gold-light:#e8c9a8;--c-water:#7fb3c9;
  --c-cream:#f7f5f0;--c-paper:#fefdfb;--c-ink:#1a2e1e;
  --c-muted:#6b8f7e;--c-border:#d4cec4;--c-light:#eae6df;
  --c-meal:#fdf6ee;--c-meal-border:#e8c9a8;
  --r:10px;--shadow:0 2px 12px rgba(26,77,58,.08);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif;
  background:var(--c-cream);color:var(--c-ink);line-height:1.7;font-size:15px}
a{color:var(--c-emerald);text-decoration:none}
.container{max-width:1120px;margin:0 auto;padding:0 20px}

/* ===== HERO ===== */
.hero{position:relative;background:linear-gradient(170deg,var(--c-forest) 0%,var(--c-emerald) 60%,var(--c-jade) 100%);
  color:#fff;padding:60px 0 80px;overflow:hidden}
.hero::after{content:"";position:absolute;bottom:0;left:0;right:0;height:60px;
  background:var(--c-cream);clip-path:ellipse(55% 100% at 50% 100%)}
.hero-mountains{position:absolute;bottom:55px;left:0;right:0;height:120px;opacity:.12}
.hero-mountains svg{width:100%;height:100%}
.hero-content{position:relative;z-index:1;text-align:center}
.hero h1{font-size:clamp(28px,5vw,42px);font-weight:700;letter-spacing:2px;margin-bottom:8px}
.hero-sub{font-size:15px;opacity:.85;margin-bottom:24px}
.hero-stats{display:flex;justify-content:center;gap:32px;flex-wrap:wrap}
.hero-stat{text-align:center}
.hero-stat-val{font-size:22px;font-weight:600}
.hero-stat-label{font-size:12px;opacity:.7;margin-top:2px}
.hero-weather-summary{margin-top:20px;padding:12px 24px;background:rgba(255,255,255,.12);
  border-radius:20px;display:inline-block;font-size:13px;backdrop-filter:blur(4px)}

/* ===== WEATHER STRIP ===== */
.weather-section{padding:32px 0 24px}
.section-title{font-size:20px;font-weight:600;color:var(--c-forest);margin-bottom:20px;
  display:flex;align-items:center;gap:10px}
.section-title::before{content:"";width:4px;height:22px;background:var(--c-gold);border-radius:2px}
.weather-strip{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch}
.weather-strip::-webkit-scrollbar{height:4px}
.weather-strip::-webkit-scrollbar-thumb{background:var(--c-border);border-radius:4px}
.weather-card{flex:0 0 160px;background:var(--c-paper);border:1px solid var(--c-border);
  border-radius:var(--r);padding:16px;text-align:center;transition:box-shadow .2s}
.weather-card:hover{box-shadow:var(--shadow)}
.weather-card.rainy{border-left:3px solid var(--c-water)}
.weather-card.sunny{border-left:3px solid var(--c-gold)}
.weather-card.cloudy,.weather-card.partlyCloudy{border-left:3px solid var(--c-muted)}
.wc-date{font-size:13px;color:var(--c-muted);font-weight:500}
.wc-weekday{font-size:12px;color:var(--c-muted)}
.wc-icon{font-size:28px;margin:8px 0}
.wc-temp{font-size:18px;font-weight:600;color:var(--c-forest)}
.wc-temp span{font-size:13px;color:var(--c-muted);font-weight:400}

/* ===== ITINERARY ===== */
.itinerary-section{padding:16px 0 40px}
.itinerary-layout{display:flex;gap:24px;align-items:flex-start}
.day-nav{position:sticky;top:20px;flex:0 0 180px;display:flex;flex-direction:column;gap:6px}
.day-nav-btn{cursor:pointer;padding:12px 16px;background:var(--c-paper);border:1px solid var(--c-border);
  border-radius:var(--r);font-size:13px;text-align:left;transition:all .2s;font-family:inherit}
.day-nav-btn:hover{border-color:var(--c-jade)}
.day-nav-btn.active{background:var(--c-forest);color:#fff;border-color:var(--c-forest)}
.day-nav-btn .dn-date{font-weight:600;font-size:14px}
.day-nav-btn .dn-theme{font-size:11px;opacity:.7;margin-top:2px;display:block;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.day-content{flex:1;min-width:0}
.day-panel{display:none;animation:fadeIn .3s ease}
.day-panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.day-header{display:flex;align-items:baseline;gap:12px;margin-bottom:20px;padding-bottom:12px;
  border-bottom:2px solid var(--c-light)}
.day-header h3{font-size:22px;color:var(--c-forest)}
.day-header .dh-weather{font-size:14px;color:var(--c-muted);margin-left:auto}

/* Activity cards */
.activity{display:flex;gap:16px;margin-bottom:12px;position:relative;padding-left:20px}
.activity::before{content:"";position:absolute;left:6px;top:26px;bottom:-12px;width:1px;background:var(--c-border)}
.activity:last-child::before{display:none}
.activity::after{content:"";position:absolute;left:2px;top:8px;width:9px;height:9px;
  border-radius:50%;background:var(--c-jade);border:2px solid var(--c-cream)}
.act-time{flex:0 0 48px;font-size:13px;font-weight:600;color:var(--c-emerald);padding-top:4px}
.act-body{flex:1;background:var(--c-paper);border:1px solid var(--c-border);border-radius:var(--r);
  padding:14px 16px;transition:box-shadow .2s}
.act-body:hover{box-shadow:var(--shadow)}
.act-name{font-weight:600;font-size:14px;color:var(--c-ink)}
.act-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;font-size:12px;color:var(--c-muted)}
.act-tag{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;
  background:var(--c-light);border-radius:12px;font-size:11px}
.act-tag.cost{background:#fef3e6;color:#b5710a}
.act-note{margin-top:8px;font-size:12px;color:var(--c-muted);line-height:1.6;
  padding:8px 10px;background:var(--c-cream);border-radius:6px}

/* Meal cards */
.activity.is-meal .act-body{background:var(--c-meal);border-color:var(--c-meal-border)}
.activity.is-meal::after{background:var(--c-gold)}
.meal-info{margin-top:8px;font-size:12px}
.meal-rec{color:var(--c-gold);font-weight:500;margin-top:4px}

/* ===== HOTELS ===== */
.hotels-section{padding:32px 0}
.hotel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.hotel-card{background:var(--c-paper);border:1px solid var(--c-border);border-radius:var(--r);
  padding:20px;transition:box-shadow .2s;cursor:pointer}
.hotel-card:hover{box-shadow:var(--shadow)}
.hotel-card.primary{border-left:4px solid var(--c-emerald)}
.hotel-card.alt{border-left:4px solid var(--c-border)}
.hc-name{font-weight:600;font-size:15px;color:var(--c-forest)}
.hc-area{font-size:12px;color:var(--c-muted);margin-top:2px}
.hc-price{font-size:20px;font-weight:700;color:var(--c-emerald);margin-top:10px}
.hc-price span{font-size:12px;font-weight:400;color:var(--c-muted)}
.hc-rating{display:inline-flex;align-items:center;gap:4px;font-size:13px;font-weight:600;
  color:var(--c-gold);margin-top:6px}
.hc-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px}
.hc-tag{font-size:11px;padding:3px 8px;background:var(--c-cream);border-radius:10px;color:var(--c-muted)}
.hc-nights{font-size:11px;color:var(--c-muted);margin-top:8px;padding-top:8px;border-top:1px solid var(--c-light)}

/* ===== BUDGET ===== */
.budget-section{padding:32px 0}
.budget-layout{display:flex;gap:32px;align-items:flex-start;flex-wrap:wrap}
.budget-chart{flex:0 0 220px;position:relative}
.donut{width:200px;height:200px;border-radius:50%;position:relative;margin:0 auto}
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;width:120px;height:120px;background:var(--c-paper);border-radius:50%;
  display:flex;flex-direction:column;justify-content:center;box-shadow:inset 0 0 8px rgba(0,0,0,.04)}
.donut-total{font-size:22px;font-weight:700;color:var(--c-forest)}
.donut-label{font-size:11px;color:var(--c-muted)}
.budget-legend{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:16px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--c-muted)}
.legend-dot{width:10px;height:10px;border-radius:3px}
.budget-details{flex:1;min-width:280px}
.budget-category{margin-bottom:8px}
.budget-cat-header{display:flex;justify-content:space-between;align-items:center;
  padding:10px 14px;background:var(--c-paper);border:1px solid var(--c-border);
  border-radius:var(--r);cursor:pointer;transition:background .2s;font-size:14px}
.budget-cat-header:hover{background:var(--c-light)}
.budget-cat-header .bch-name{font-weight:500}
.budget-cat-header .bch-cost{font-weight:600;color:var(--c-emerald)}
.budget-cat-items{display:none;padding:8px 14px 4px;font-size:13px}
.budget-cat-items.open{display:block}
.bci-row{display:flex;justify-content:space-between;padding:4px 0;color:var(--c-muted)}
.bci-row .bci-tag{font-size:10px;padding:1px 5px;border-radius:4px;margin-left:4px}
.bci-tag.flyai{background:#e6f7ef;color:#059669}
.bci-tag.ref{background:#fef3e6;color:#b5710a}
.bci-tag.estimate{background:#f0f0f0;color:#666}
.budget-total{margin-top:16px;padding:16px;background:var(--c-forest);color:#fff;
  border-radius:var(--r);display:flex;justify-content:space-between;align-items:center}
.bt-amount{font-size:24px;font-weight:700}
.bt-per{font-size:13px;opacity:.8}
.budget-note{font-size:11px;color:var(--c-muted);margin-top:12px;line-height:1.6}

/* ===== TIPS ===== */
.tips-section{padding:32px 0}
.tip-item{margin-bottom:6px}
.tip-item details{background:var(--c-paper);border:1px solid var(--c-border);border-radius:var(--r);overflow:hidden}
.tip-item summary{padding:12px 16px;cursor:pointer;font-size:13px;font-weight:500;
  list-style:none;display:flex;align-items:center;gap:8px;transition:background .2s}
.tip-item summary:hover{background:var(--c-light)}
.tip-item summary::before{content:"\25B6";font-size:10px;color:var(--c-muted);transition:transform .2s}
.tip-item details[open] summary::before{transform:rotate(90deg)}
.tip-item summary::-webkit-details-marker{display:none}
.tip-content{padding:0 16px 14px;font-size:13px;color:var(--c-muted);line-height:1.7}
.tip-item.important details{border-left:3px solid var(--c-gold)}
.tip-item.important summary{color:var(--c-gold);font-weight:600}

/* ===== FOOTER ===== */
.footer{padding:32px 0;border-top:1px solid var(--c-border);margin-top:20px}
.footer-reliability{font-size:11px;color:var(--c-muted);line-height:1.8}
.footer-reliability h4{font-size:13px;color:var(--c-ink);margin-bottom:8px}
.rel-row{display:flex;gap:8px;margin-bottom:4px}
.rel-dot{flex:0 0 8px;height:8px;border-radius:50%;margin-top:5px}
.rel-dot.green{background:#059669}
.rel-dot.blue{background:var(--c-water)}
.rel-dot.yellow{background:var(--c-gold)}
.footer-gen{text-align:center;margin-top:20px;font-size:11px;color:var(--c-border)}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .hero{padding:40px 0 60px}
  .hero h1{font-size:26px}
  .hero-stats{gap:20px}
  .itinerary-layout{flex-direction:column}
  .day-nav{position:static;flex-direction:row;overflow-x:auto;flex-wrap:nowrap;
    padding-bottom:8px;-webkit-overflow-scrolling:touch}
  .day-nav-btn{flex:0 0 auto;padding:10px 14px}
  .day-nav-btn .dn-theme{display:none}
  .budget-layout{flex-direction:column}
  .budget-chart{flex:none;width:100%}
  .hotel-grid{grid-template-columns:1fr}
  .activity{padding-left:16px}
}
@media(max-width:480px){
  .container{padding:0 12px}
  .hero-stats{flex-direction:column;gap:8px}
  .weather-card{flex:0 0 130px;padding:12px}
  .act-meta{gap:4px}
}

/* ===== PRINT ===== */
@media print{
  body{background:#fff;font-size:12px}
  .hero{background:var(--c-forest)!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;padding:20px 0 30px}
  .hero::after{display:none}
  .day-nav{display:none}
  .day-panel{display:block!important;page-break-inside:avoid;margin-bottom:20px}
  .itinerary-layout{display:block}
  .budget-cat-items{display:block!important}
  .tip-item details{display:block}
  .tip-item details[open] .tip-content,.tip-content{display:block!important}
  .hotel-card:hover,.act-body:hover{box-shadow:none}
  .weather-strip{flex-wrap:wrap}
  .weather-card{flex:1 0 100px}
}
</style>
</head>

/* ===== RENDER HERO ===== */
function renderHero() {
  var d = tripData;
  var h = '';
  h += '<h1>' + d.title + '</h1>';
  h += '<p class="hero-sub">' + d.dateRange + ' \u00b7 ' + d.travelers + '</p>';
  h += '<div class="hero-stats">';
  h += '<div class="hero-stat"><div class="hero-stat-val">' + d.days.length + '\u5929</div><div class="hero-stat-label">\u884c\u7a0b\u5929\u6570</div></div>';
  h += '<div class="hero-stat"><div class="hero-stat-val">\u00a5' + d.budget.total.toLocaleString() + '</div><div class="hero-stat-label">\u9884\u4f30\u603b\u8d39</div></div>';
  h += '<div class="hero-stat"><div class="hero-stat-val">\u00a5' + d.budget.perPerson.toLocaleString() + '</div><div class="hero-stat-label">\u4eba\u5747\u8d39\u7528</div></div>';
  h += '<div class="hero-stat"><div class="hero-stat-val">3</div><div class="hero-stat-label">\u6838\u5fc3\u666f\u70b9</div></div>';
  h += '</div>';
  h += '<div class="hero-weather-summary">' + d.weather.summary + ' \u00b7 ' + d.weather.clothing + '</div>';
  document.getElementById('heroContent').innerHTML = h;
}

  var strip = document.getElementById('weatherStrip');
  var h = '';
  for (var i = 0; i < tripData.days.length; i++) {
    var day = tripData.days[i];
    var cls = 'weather-card ' + day.weather.icon;
    h += '<div class="' + cls + '">';
    h += '<div class="wc-date">' + day.date + '</div>';
    h += '<div class="wc-weekday">' + day.weekday + '</div>';
    h += '<div class="wc-icon">' + weatherIcon(day.weather.icon) + '</div>';
    h += '<div class="wc-temp">' + day.weather.high + '\u00b0 <span>/ ' + day.weather.low + '\u00b0</span></div>';
    h += '</div>';
  }
  strip.innerHTML = h;
}

/* ===== RENDER ACTIVITY CARD ===== */
function renderActivity(act) {
  var isMeal = !!act.meal;
  var cls = 'activity' + (isMeal ? ' is-meal' : '');
  var h = '<div class="' + cls + '">';
  h += '<div class="act-time">' + act.time + '</div>';
  h += '<div class="act-body">';
  h += '<div class="act-name">' + act.name + '</div>';
  h += '<div class="act-meta">';
  if (act.duration) {
    h += '<span class="act-tag">' + act.duration + '</span>';
  }
  if (act.transport && act.transport !== '-') {
    h += '<span class="act-tag">' + act.transport + '</span>';
  }
  if (act.cost > 0) {
    h += '<span class="act-tag cost">\u00a5' + act.cost + '/\u4eba</span>';
  }
  h += '</div>';
  if (isMeal) {
    var m = act.meal;
    h += '<div class="meal-info">';
    h += '<div>' + m.name + ' \u00b7 ' + m.cuisine + '</div>';
    if (m.perPerson > 0) {
      h += '<div>\u4eba\u5747\u7ea6\u00a5' + m.perPerson + ' \u00b7 ' + m.location + '</div>';
    }
    h += '<div class="meal-rec">\u63a8\u8350\uff1a' + m.recommended + '</div>';
    h += '</div>';
  }
  if (act.note) {
    h += '<div class="act-note">' + act.note + '</div>';
  }
  h += '</div></div>';
  return h;
}

/* ===== RENDER ITINERARY ===== */
function renderItinerary() {
  var nav = document.getElementById('dayNav');
  var content = document.getElementById('dayContent');
  var navH = '';
  var contentH = '';
  for (var i = 0; i < tripData.days.length; i++) {
    var day = tripData.days[i];
    var isFirst = i === 0;
    navH += '<button class="day-nav-btn' + (isFirst ? ' active' : '') + '" data-day="' + i + '" onclick="switchDay(' + i + ')">';
    navH += '<span class="dn-date">' + day.date + ' ' + day.weekday + '</span>';
    navH += '<span class="dn-theme">' + day.theme + '</span>';
    navH += '</button>';
    contentH += '<div class="day-panel' + (isFirst ? ' active' : '') + '" data-panel="' + i + '">';
    contentH += '<div class="day-header">';
    contentH += '<h3>' + day.theme + '</h3>';
    contentH += '<span class="dh-weather">' + weatherIcon(day.weather.icon) + ' ' + day.weather.high + '\u00b0/' + day.weather.low + '\u00b0</span>';
    contentH += '</div>';
    for (var j = 0; j < day.activities.length; j++) {
      contentH += renderActivity(day.activities[j]);
    }
    contentH += '</div>';
  }
  nav.innerHTML = navH;
  content.innerHTML = contentH;
}

function switchDay(idx) {
  var btns = document.querySelectorAll('.day-nav-btn');
  var panels = document.querySelectorAll('.day-panel');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle('active', i === idx);
    panels[i].classList.toggle('active', i === idx);
  }
}

/* ===== RENDER HOTELS ===== */
function renderHotels() {
  var grid = document.getElementById('hotelGrid');
  var h = '';
  for (var i = 0; i < tripData.hotels.length; i++) {
    var hotel = tripData.hotels[i];
    var isPrimary = i < 2;
    h += '<div class="hotel-card ' + (isPrimary ? 'primary' : 'alt') + '">';
    h += '<div class="hc-name">' + hotel.name + '</div>';
    h += '<div class="hc-area">' + hotel.area + '</div>';
    h += '<div class="hc-price">' + hotel.priceTag + '\u00a5' + hotel.pricePerNight + ' <span>/\u665a/\u95f4</span></div>';
    h += '<div class="hc-rating">\u2605 ' + hotel.rating + '</div>';
    h += '<div class="hc-tags">';
    var tags = hotel.highlights.split('\u00b7');
    for (var j = 0; j < tags.length; j++) {
      if (tags[j].trim()) {
        h += '<span class="hc-tag">' + tags[j].trim() + '</span>';
      }
    }
    h += '</div>';
    h += '<div class="hc-nights">' + hotel.nights + '</div>';
    h += '</div>';
  }
  grid.innerHTML = h;
}

/* ===== RENDER BUDGET ===== */
function renderBudget() {
  var b = tripData.budget;
  var cats = [
    { key: 'transport', name: '\u4ea4\u901a', color: '#2d7a5e' },
    { key: 'accommodation', name: '\u4f4f\u5bbf', color: '#4a9e7a' },
    { key: 'food', name: '\u9910\u996e', color: '#c8956d' },
    { key: 'tickets', name: '\u95e8\u7968', color: '#7fb3c9' },
    { key: 'other', name: '\u5176\u4ed6', color: '#d4cec4' }
  ];
  /* Donut chart */
  var total = b.total;
  var angles = [];
  var cum = 0;
  for (var i = 0; i < cats.length; i++) {
    var pct = b[cats[i].key].subtotal / total * 100;
    angles.push({ start: cum, end: cum + pct, color: cats[i].color });
    cum += pct;
  }
  var grad = '';
  for (var i = 0; i < angles.length; i++) {
    if (i > 0) grad += ', ';
    grad += angles[i].color + ' ' + angles[i].start.toFixed(1) + '% ' + angles[i].end.toFixed(1) + '%';
  }
  var chartH = '<div class="donut" style="background:conic-gradient(' + grad + ')">';
  chartH += '<div class="donut-center"><div class="donut-total">\u00a5' + total.toLocaleString() + '</div><div class="donut-label">\u9884\u4f30\u603b\u8d39</div></div>';
  chartH += '</div>';
  chartH += '<div class="budget-legend">';
  for (var i = 0; i < cats.length; i++) {
    var pct = (b[cats[i].key].subtotal / total * 100).toFixed(0);
    chartH += '<div class="legend-item"><div class="legend-dot" style="background:' + cats[i].color + '"></div>' + cats[i].name + ' ' + pct + '%</div>';
  }
  chartH += '</div>';
  document.getElementById('budgetChart').innerHTML = chartH;

  /* Details */
  var detH = '';
  for (var i = 0; i < cats.length; i++) {
    var cat = b[cats[i].key];
    detH += '<div class="budget-category">';
    detH += '<div class="budget-cat-header" onclick="this.nextElementSibling.classList.toggle(\'open\')">';
    detH += '<span class="bch-name">' + cats[i].name + '</span>';
    detH += '<span class="bch-cost">\u00a5' + cat.subtotal.toLocaleString() + '</span>';
    detH += '</div>';
    detH += '<div class="budget-cat-items">';
    for (var j = 0; j < cat.items.length; j++) {
      var item = cat.items[j];
      var tagHtml = '';
      if (item.tag === 'flyai') tagHtml = '<span class="bci-tag flyai">\u5b9e\u67e5</span>';
      else if (item.tag === 'ref') tagHtml = '<span class="bci-tag ref">\u53c2\u8003</span>';
      else if (item.tag === 'estimate') tagHtml = '<span class="bci-tag estimate">\u4f30\u7b97</span>';
      detH += '<div class="bci-row"><span>' + item.name + tagHtml + '</span><span>\u00a5' + item.cost.toLocaleString() + '</span></div>';
    }
    detH += '</div></div>';
  }
  detH += '<div class="budget-total">';
  detH += '<div><div class="bt-amount">\u00a5' + total.toLocaleString() + '</div><div class="bt-per">\u4eba\u5747 \u00a5' + b.perPerson.toLocaleString() + '</div></div>';
  detH += '<div style="text-align:right;font-size:12px;opacity:.8">' + b.note + '</div>';
  detH += '</div>';
  document.getElementById('budgetDetails').innerHTML = detH;
}

/* ===== RENDER TIPS ===== */
function renderTips() {
  var list = document.getElementById('tipsList');
  var importantKeys = ['\u65e0\u969c\u788d', '\u5bfc\u822a\u9677\u9631', '\u67af\u6c34\u671f', '\u5b89\u5168', '\u88c5\u5907', '\u533b\u7597'];
  var h = '';
  for (var i = 0; i < tripData.tips.length; i++) {
    var tip = tripData.tips[i];
    var isImportant = false;
    for (var k = 0; k < importantKeys.length; k++) {
      if (tip.indexOf(importantKeys[k]) !== -1) { isImportant = true; break; }
    }
    var title = '';
    var body = tip;
    var m = tip.match(/\u3010(.+?)\u3011(.*)/);
    if (m) { title = m[1]; body = m[2]; }
    h += '<div class="tip-item' + (isImportant ? ' important' : '') + '">';
    h += '<details' + (i < 3 ? ' open' : '') + '>';
    h += '<summary>' + (title || ('Tip ' + (i + 1))) + '</summary>';
    h += '<div class="tip-content">' + body + '</div>';
    h += '</details></div>';
  }
  list.innerHTML = h;
}

/* ===== RENDER FOOTER ===== */

  h += '<p style="margin-top:12px">\u5929\u6c14\u9884\u62a5\u6765\u6e90\uff1a\u4e2d\u56fd\u5929\u6c14\u7f51(weather.com.cn)\u6269\u5c55\u9884\u62a5 | \u653b\u7565\u4fe1\u606f\u6765\u6e90\uff1a\u5c0f\u7ea2\u4e66\u771f\u5b9e\u7528\u6237\u7b14\u8bb0 | \u751f\u6210\u65e5\u671f\uff1a' + tripData.generationDate + '</p>';
  document.getElementById('footerReliability').innerHTML = h;
  document.getElementById('footerGen').textContent = '\u5d07\u5de6 6\u65e5\u4eb2\u5b50\u6e38 \u00b7 \u7531AI\u751f\u6210 \u00b7 \u51fa\u884c\u524d\u8bf7\u786e\u8ba4\u673a\u7968\u9152\u5e97\u5e76\u63d0\u524d\u9884\u8ba2';
}

/* ===== INIT ===== */
renderHero();
renderWeather();
renderItinerary();
renderHotels();

renderTips();

</script>
