<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>弥勒·建水 6日慢旅行</title>
<style>
:root{--terra:#C45B3E;--terra-d:#A34830;--terra-l:#F5E6E1;--lav:#9B7EC8;--lav-d:#7B5EAD;--lav-l:#F0EBF7;--pot:#8B6F4E;--pot-l:#F0EAE0;--gold:#D4A84B;--gold-l:#FDF6E3;--cream:#FFF8F0;--cream-d:#FAF0E4;--txt:#3D2B1F;--txt-b:#5C4A3A;--txt-m:#8C7B6B;--bdr:#E8DDD2;--card:#FFF;--r:20px;--rs:12px;--ease:cubic-bezier(.4,0,.2,1)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;background:var(--cream);color:var(--txt-b);line-height:1.7;-webkit-font-smoothing:antialiased}
.mx{max-width:1080px;margin:0 auto;padding:0 20px}
h1,h2,h3,.serif{font-family:"Noto Serif SC","STSong","SimSun",serif}

/* ━━ Hero Strip ━━ */
.hero-strip{background:linear-gradient(135deg,var(--terra),var(--lav) 70%,var(--pot));color:#fff;padding:32px 0;position:relative;overflow:hidden}
.hero-strip::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:32px;background:var(--cream);clip-path:ellipse(55% 100% at 50% 100%)}
.hero-inner{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
.hero-text h1{font-size:1.8rem;font-weight:700;letter-spacing:.03em;line-height:1.3}
.hero-text p{font-size:.88rem;opacity:.85;margin-top:4px}
.hero-pills{display:flex;gap:10px;flex-wrap:wrap}
.hero-pill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.2);padding:5px 14px;border-radius:99px;font-size:.82rem;white-space:nowrap}
.hero-pill svg{width:14px;height:14px;opacity:.8}

/* ━━ Bento Grid ━━ */
.bento{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:32px 0}
.bento-card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:20px;box-shadow:0 2px 8px rgba(60,40,20,.06);transition:all .25s var(--ease);cursor:default;overflow:hidden}
.bento-card:hover{box-shadow:0 6px 20px rgba(60,40,20,.1);transform:translateY(-2px)}
.b-span2{grid-column:span 2}
.b-span-full{grid-column:1/-1}
.bento-label{font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--txt-m);font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.bento-label svg{width:14px;height:14px}
.bento-val{font-size:1.6rem;font-weight:800;color:var(--txt);letter-spacing:-.02em}
.bento-val small{font-size:.7em;font-weight:500;color:var(--txt-m)}
.bento-sub{font-size:.82rem;color:var(--txt-m);margin-top:4px}
.route-flow{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:8px;font-size:.85rem;font-weight:500;color:var(--txt)}
.route-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.route-arrow{color:var(--txt-m);font-size:.75rem}
.weather-mini{display:flex;gap:8px;margin-top:10px;overflow-x:auto}
.wm-day{text-align:center;flex:0 0 auto;min-width:52px}
.wm-day svg{width:20px;height:20px}
.wm-date{font-size:.65rem;color:var(--txt-m)}
.wm-temp{font-size:.72rem;font-weight:600;color:var(--txt)}

/* ━━ Day Selector ━━ */
.sec{padding:28px 0}
.sec-title{font-size:1.15rem;font-weight:600;color:var(--txt);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.sec-title svg{width:20px;height:20px}
.day-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch}
.day-tabs::-webkit-scrollbar{height:0}
.day-tab{flex:0 0 auto;min-width:140px;padding:14px 16px;border-radius:var(--rs);border:2px solid var(--bdr);background:var(--card);cursor:pointer;transition:all .2s var(--ease);position:relative}
.day-tab:hover{border-color:var(--terra);box-shadow:0 4px 12px rgba(196,91,62,.1)}
.day-tab.active{border-color:var(--terra);background:var(--terra-l);box-shadow:0 4px 16px rgba(196,91,62,.15)}
.day-tab.active::after{content:'';position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:8px solid var(--terra)}
.dt-num{font-size:.7rem;font-weight:700;color:var(--terra);text-transform:uppercase;letter-spacing:.05em}
.dt-theme{font-size:.85rem;font-weight:600;color:var(--txt);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dt-meta{font-size:.72rem;color:var(--txt-m);margin-top:4px;display:flex;align-items:center;gap:6px}
.dt-meta svg{width:12px;height:12px}

/* ━━ Day Detail ━━ */
.day-detail{margin-top:16px;background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:24px;box-shadow:0 2px 12px rgba(60,40,20,.06);animation:fadeSlide .3s var(--ease)}
@keyframes fadeSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.day-detail-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:14px;border-bottom:2px solid var(--bdr)}
.dd-badge{width:44px;height:44px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;color:#fff;flex-shrink:0}
.dd-title{font-size:1.1rem;font-weight:700;color:var(--txt)}
.dd-sub{font-size:.8rem;color:var(--txt-m)}

/* ━━ Timeline (vertical, inside detail) ━━ */
.tl{position:relative;padding-left:28px;margin-top:4px}
.tl::before{content:'';position:absolute;left:9px;top:8px;bottom:8px;width:2px;background:linear-gradient(var(--terra),var(--lav),var(--bdr));border-radius:2px}
.tl-i{position:relative;margin-bottom:18px}
.tl-i:last-child{margin-bottom:0}
.tl-d{position:absolute;left:-24px;top:5px;width:12px;height:12px;border-radius:50%;border:2.5px solid var(--terra);background:#fff;z-index:1;box-shadow:0 0 0 3px var(--terra-l)}
.tl-i.meal .tl-d{border-color:var(--gold);background:var(--gold-l);box-shadow:0 0 0 3px var(--gold-l)}
.tl-t{font-size:.74rem;color:var(--txt-m);font-weight:600}
.tl-h{font-size:.9rem;font-weight:600;color:var(--txt);margin:1px 0}
.tl-p{font-size:.8rem;color:var(--txt-m);line-height:1.5}
.tl-tags{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.tag{font-size:.7rem;padding:2px 9px;border-radius:99px;font-weight:500}
.tag-c{background:var(--terra-l);color:var(--terra-d)}
.tag-t{background:var(--lav-l);color:var(--lav-d)}
.tag-f{background:var(--pot-l);color:var(--pot)}
.meal-box{display:flex;align-items:center;gap:10px;padding:8px 12px;background:linear-gradient(135deg,var(--gold-l),#FFFBF0);border:1px solid #ECD9A8;border-radius:var(--rs);margin-top:4px}
.meal-ic{width:32px;height:32px;border-radius:8px;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.06);color:var(--gold);flex-shrink:0}
.meal-ic svg{width:16px;height:16px}
.meal-nfo{flex:1;min-width:0}
.meal-nm{font-weight:600;font-size:.84rem;color:var(--txt)}
.meal-dt{font-size:.74rem;color:var(--txt-m);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meal-pr{font-weight:700;color:var(--terra);font-size:.88rem;white-space:nowrap}

/* ━━ Hotels (horizontal scroll) ━━ */
.hotel-scroll{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch}
.hotel-scroll::-webkit-scrollbar{height:4px}
.hotel-scroll::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:99px}
.h-card{flex:0 0 280px;background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:18px;box-shadow:0 2px 8px rgba(60,40,20,.06);transition:all .25s var(--ease);cursor:default;position:relative}
.h-card:hover{box-shadow:0 6px 20px rgba(60,40,20,.1);transform:translateY(-3px)}
.h-badge{position:absolute;top:10px;right:10px;background:linear-gradient(135deg,var(--terra),var(--lav));color:#fff;font-size:.68rem;font-weight:600;padding:2px 10px;border-radius:99px}
.h-name{font-size:.95rem;font-weight:700;color:var(--txt);padding-right:50px;margin-bottom:3px}
.h-area{font-size:.78rem;color:var(--txt-m);margin-bottom:8px;display:flex;align-items:center;gap:3px}
.h-area svg{width:12px;height:12px;color:var(--terra)}
.h-price{font-size:1.2rem;font-weight:800;color:var(--terra)}
.h-price span{font-size:.72rem;color:var(--txt-m);font-weight:400}
.h-tags{margin-top:8px;display:flex;flex-wrap:wrap;gap:3px}
.h-tag{font-size:.66rem;padding:2px 7px;border-radius:4px;background:var(--lav-l);color:var(--lav-d)}

/* ━━ Budget (donut + legend) ━━ */
.budget-row{display:flex;gap:24px;align-items:center;flex-wrap:wrap}
.donut-wrap{flex:0 0 180px;position:relative}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.donut-total{font-size:1.3rem;font-weight:800;color:var(--txt)}
.donut-label{font-size:.72rem;color:var(--txt-m)}
.budget-legend{flex:1;min-width:200px;display:flex;flex-direction:column;gap:8px}
.bl-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--rs);background:var(--card);border:1px solid var(--bdr);transition:all .2s var(--ease);cursor:default}
.bl-item:hover{box-shadow:0 2px 8px rgba(60,40,20,.08)}
.bl-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.bl-name{flex:1;font-size:.84rem;color:var(--txt-b)}
.bl-val{font-size:.88rem;font-weight:700;color:var(--txt)}
.budget-detail{margin-top:16px}
.budget-detail summary{font-size:.85rem;font-weight:600;color:var(--terra);cursor:pointer;padding:8px 0}
.budget-detail table{width:100%;border-collapse:collapse;font-size:.82rem;margin-top:4px}
.budget-detail th{text-align:left;padding:6px 10px;background:var(--cream-d);color:var(--txt-m);font-weight:600;font-size:.74rem;text-transform:uppercase;letter-spacing:.04em}
.budget-detail td{padding:6px 10px;border-bottom:1px solid var(--bdr);color:var(--txt-m)}
.budget-detail td:last-child{text-align:right}
.budget-detail .cat td{font-weight:600;color:var(--txt);background:var(--cream)}
.budget-bar{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-radius:var(--r);background:linear-gradient(135deg,var(--terra),var(--lav) 70%,var(--pot));color:#fff;margin-top:16px}
.bb-label{font-size:.88rem;opacity:.9}
.bb-per{font-size:.78rem;opacity:.7;margin-top:2px}
.bb-amount{font-size:1.5rem;font-weight:800}

/* ━━ Tips (masonry) ━━ */
.tips-mason{columns:2;column-gap:12px}
.tip-c{break-inside:avoid;margin-bottom:12px;display:flex;align-items:flex-start;gap:8px;padding:10px 12px;background:var(--gold-l);border:1px solid #ECD9A8;border-radius:var(--rs);font-size:.82rem;color:var(--txt-b)}
.tip-ic{width:22px;height:22px;border-radius:6px;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 2px rgba(0,0,0,.06);color:var(--gold);flex-shrink:0}
.tip-ic svg{width:12px;height:12px}

/* ━━ Footer ━━ */
.foot{text-align:center;padding:28px 20px;color:var(--txt-m);font-size:.74rem}
.foot-track{width:50px;height:3px;margin:0 auto 10px;background:repeating-linear-gradient(90deg,var(--terra) 0,var(--terra) 5px,transparent 5px,transparent 9px);border-radius:2px;opacity:.35}

/* ━━ Responsive ━━ */
@media(max-width:768px){
  .bento{grid-template-columns:repeat(2,1fr)}
  .hero-inner{flex-direction:column;align-items:flex-start}
  .hero-text h1{font-size:1.4rem}
  .budget-row{flex-direction:column;align-items:stretch}
  .donut-wrap{align-self:center}
  .tips-mason{columns:1}
}
@media(max-width:480px){
  .bento{grid-template-columns:1fr}
  .b-span2{grid-column:span 1}
  .day-tab{min-width:120px}
  .h-card{flex:0 0 240px}
}
@media print{
  body{background:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .day-tabs,.hotel-scroll{flex-wrap:wrap;overflow:visible}
  .day-detail{break-inside:avoid}
  .h-card:hover,.bento-card:hover,.bl-item:hover{transform:none;box-shadow:none}
}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
:focus-visible{outline:2px solid var(--terra);outline-offset:2px;border-radius:4px}
</style>
</head>

const segments=cats.map(([c,d])=>{const pct=d.subtotal/total*100;const start=cumPct;cumPct+=pct;return{cat:c,pct,start,color:BC[c]||'#8C7B6B'};});
const donutSegs=segments.map(s=>{const r=70,C=2*Math.PI*r;const dash=s.pct/100*C;const gap=C-dash;const offset=-s.start/100*C-C/4;return `<circle r="${r}" cx="90" cy="90" fill="none" stroke="${s.color}" stroke-width="20" stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${offset}" stroke-linecap="round"/>`;}).join('');
const legend=cats.map(([c,d])=>`<div class="bl-item"><div class="bl-dot" style="background:${BC[c]}"></div><div class="bl-name">${BL[c]||c}</div><div class="bl-val">¥${d.subtotal.toLocaleString()}</div></div>`).join('');
document.getElementById('budgetRow').innerHTML=`<div class="donut-wrap"><svg viewBox="0 0 180 180" width="180" height="180"><circle r="70" cx="90" cy="90" fill="none" stroke="var(--bdr)" stroke-width="20"/>${donutSegs}</svg><div class="donut-center"><div class="donut-total">¥${total.toLocaleString()}</div><div class="donut-label">预估总费用</div></div></div><div class="budget-legend">${legend}</div>`;
document.querySelector('#budgetTable tbody').innerHTML=cats.map(([c,d])=>{let r=`<tr class="cat"><td colspan="2" style="color:${BC[c]}">${BL[c]||c}</td><td style="font-weight:600;color:${BC[c]}">¥${d.subtotal.toLocaleString()}</td></tr>`;d.items.forEach(it=>{r+=`<tr><td></td><td>${it.name}</td><td>¥${it.cost.toLocaleString()}</td></tr>`;});return r;}).join('');
document.getElementById('budgetBar').innerHTML=`<div><div class="bb-label">预估总费用</div><div class="bb-per">人均 ¥${(D.budget.perPerson||0).toLocaleString()}</div></div><div class="bb-amount">¥${total.toLocaleString()}</div>`;

// Tips
document.getElementById('tipsMason').innerHTML=D.tips.map(t=>`<div class="tip-c"><div class="tip-ic">${I.bulb}</div><span>${t}</span></div>`).join('');
</script>
</body>
</html>
